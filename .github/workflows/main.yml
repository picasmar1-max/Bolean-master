name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential libsqlite3-dev gawk unzip git ccache \
          openjdk-17-jdk zip libffi-dev python3-dev libssl-dev \
          patch autoconf automake libtool pkg-config

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" "cython<3.0.0" virtualenv

    - name: Generate Clean Buildozer Spec
      run: |
        cat << 'EOF' > buildozer.spec
        [app]
        title = Boolean Master
        package.name = booleanmaster
        package.domain = org.test
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 0.1
        requirements = python3, kivy, sympy
        orientation = portrait
        fullscreen = 0
        android.archs = arm64-v8a, armeabi-v7a
        android.minapi = 21
        android.ndk_api = 33
        android.private_storage = True
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Build APK with Buildozer
      run: |
        buildozer -v android debug
